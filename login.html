<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - GlobalBridge</title>

<link rel="stylesheet" href="css/style.css">

<style>
body{
font-family: Arial, sans-serif;
background:#f2f7f2;
}

.login-box{
width:90%;
max-width:400px;
margin:50px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 0 15px #ccc;
text-align:center;
}

h2{
color:#0b7a3b;
}

input{
width:90%;
padding:12px;
margin:10px;
border:1px solid #ccc;
border-radius:8px;
}

button{
background:#0b7a3b;
color:white;
padding:12px 30px;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#095c2d;
}

a{
color:#0b7a3b;
text-decoration:none;
}
</style>

</head>

<body>

<header>

<h1>GlobalBridge</h1>
<p>Ligando talentos a oportunidades no mundo</p>

<nav>
<a href="index.html">Início</a>
<a href="empregos.html">Empregos</a>
<a href="cadastro.html">Cadastro</a>
<a href="contacto.html">Contacto</a>
</nav>

</header>


<div class="login-box">

<h2>Entrar na GlobalBridge</h2>

<form>

<input type="email" placeholder="Digite seu e-mail" required>

<input type="password" placeholder="Digite sua senha" required>

<button type="submit">Entrar</button>

</form>

<p>
Ainda não tem conta?
<a href="cadastro.html">Criar cadastro</a>
</p>

</div>


<footer>

<p>
© 2026 GlobalBridge - Criando pontes para o futuro
</p>

</footer>


</body>
</html>
