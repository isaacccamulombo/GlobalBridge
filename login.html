<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login - GlobalBridge</title>

<link rel="stylesheet" href="css/style.css">

<style>
body{
font-family: Arial;
background:#f2f7f3;
}

.caixa{
width:90%;
max-width:400px;
margin:50px auto;
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 0 15px #ccc;
}

h2{
text-align:center;
color:#087830;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:12px;
background:#087830;
color:white;
border:none;
border-radius:8px;
font-size:16px;
}

a{
color:#087830;
}
</style>

</head>

<body>

<div class="caixa">

<h2>Entrar na GlobalBridge</h2>

<form>

<input type="email" placeholder="Seu email">

<input type="password" placeholder="Sua senha">

<button type="submit">
Entrar
</button>

</form>

<p>
Ainda não tem conta?
<a href="cadastro.html">
Criar cadastro
</a>
</p>

</div>

</body>
</html>
