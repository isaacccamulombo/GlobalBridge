<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Candidatura - GlobalBridge</title>

<style>
body{
font-family:Arial;
background:#f4f6f8;
margin:0;
}

header{
background:#003366;
color:white;
text-align:center;
padding:20px;
}

.container{
padding:20px;
}

form{
background:white;
padding:20px;
border-radius:10px;
}

input,select,textarea{
width:100%;
padding:12px;
margin:8px 0;
}

button{
background:#008000;
color:white;
padding:12px;
border:0;
width:100%;
}

</style>

</head>

<body>

<header>
<h1>🌍 GlobalBridge</h1>
<p>Candidatura para oportunidades internacionais</p>
</header>


<div class="container">

<h2>Enviar candidatura</h2>

<form>

<label>Nome completo</label>
<input type="text" placeholder="Digite seu nome">


<label>País</label>
<input type="text" placeholder="Ex: Angola">


<label>Área profissional</label>

<select>
<option>Construção Civil</option>
<option>Soldadura</option>
<option>Armazém e Logística</option>
<option>Agricultura</option>
<option>Limpeza</option>
</select>


<label>WhatsApp</label>
<input type="text" placeholder="Número WhatsApp">


<label>Mensagem</label>
<textarea placeholder="Conte sua experiência"></textarea>


<button>
Enviar candidatura
</button>

</form>


</div>

</body>
</html>
