<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Candidatura - GlobalBridge</title>

<style>
body{
font-family:Arial;
background:#f4f4f4;
margin:0;
}

header{
background:#006400;
color:white;
padding:25px;
text-align:center;
}

.formulario{
background:white;
margin:20px;
padding:20px;
border-radius:10px;
}

input, select, textarea{
width:100%;
padding:10px;
margin:8px 0;
}

button{
background:#006400;
color:white;
padding:12px;
border:0;
border-radius:5px;
}

footer{
background:#222;
color:white;
text-align:center;
padding:15px;
}

</style>

</head>

<body>

<header>
<h1>📄 Candidatura GlobalBridge</h1>
<p>Envie os seus dados para oportunidades de emprego</p>
</header>


<div class="formulario">

<h2>Formulário de candidato</h2>

<label>Nome completo</label>
<input type="text" placeholder="Digite seu nome">


<label>Email ou WhatsApp</label>
<input type="text" placeholder="Contacto">


<label>País onde pretende trabalhar</label>

<select>
<option>Portugal</option>
<option>Alemanha</option>
<option>Holanda</option>
<option>Canadá</option>
<option>Outro</option>
</select>


<label>Área profissional</label>

<select>
<option>Construção Civil</option>
<option>Soldadura</option>
<option>Armazém e Logística</option>
<option>Agricultura</option>
<option>Limpeza</option>
</select>


<label>Experiência profissional</label>

<textarea placeholder="Descreva sua experiência"></textarea>


<label>Link do currículo (opcional)</label>

<input type="text" placeholder="Cole o link do seu currículo">


<button>Enviar candidatura</button>

</div>


<footer>
© 2026 GlobalBridge
</footer>


</body>
</html>
