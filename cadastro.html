<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cadastro - GlobalBridge</title>

<style>
body{
font-family: Arial;
background:#f2f8f3;
margin:0;
padding:20px;
}

.container{
max-width:400px;
margin:auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 0 10px #ccc;
}

h1{
color:#087f23;
text-align:center;
}

input, select, button{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ccc;
}

button{
background:#087f23;
color:white;
border:none;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#056519;
}

a{
text-decoration:none;
color:#087f23;
}
</style>

</head>

<body>

<div class="container">

<h1>GlobalBridge</h1>

<h2>Criar conta</h2>

<form>

<input type="text" placeholder="Nome completo">

<input type="email" placeholder="Email">

<input type="tel" placeholder="WhatsApp">

<select>
<option>Área profissional</option>
<option>Construção Civil</option>
<option>Armazém e Logística</option>
<option>Soldadura</option>
<option>Limpeza</option>
<option>Agricultura</option>
</select>

<input type="password" placeholder="Criar senha">

<button>Cadastrar</button>

</form>

<p>
Já tem conta? <a href="#">Entrar</a>
</p>

</div>

</body>
</html>
